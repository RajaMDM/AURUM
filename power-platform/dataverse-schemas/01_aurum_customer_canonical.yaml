# =============================================================================
# AURUM-PP — Canonical Customer (Golden Record) Dataverse Schema
# =============================================================================
# This is the table that holds the ONE TRUSTED RECORD per real customer
# entity. Output of REFINE. Subscribed to by UNFURL. Tracked by MARK.
#
# Naming convention: aurum_<entity>_<field> (Dataverse requires a publisher
# prefix; "aurum" is our reference solution prefix).
# =============================================================================

entity:
  schema_name: aurum_customer
  display_name: "Customer (Golden Record)"
  display_collection_name: "Customers"
  description: "Canonical golden customer record produced by AURUM REFINE stage. One record per real-world entity, sourced from CRM, ECOMM, and LOYALTY staging tables."
  ownership_type: UserOwned
  has_activities: true
  has_notes: true
  is_audit_enabled: true
  primary_name_attribute: aurum_full_name

columns:
  # -------- IDENTITY --------
  - schema_name: aurum_customerid
    display_name: "Customer ID"
    description: "Primary key — generated by Dataverse. Stable across all source systems."
    type: Uniqueidentifier
    is_primary_key: true

  - schema_name: aurum_first_name
    display_name: "First Name"
    type: SingleLineOfText
    max_length: 100
    required: true
    description: "Surviving first name from highest-trust valid source. Standardized."

  - schema_name: aurum_middle_name
    display_name: "Middle Name"
    type: SingleLineOfText
    max_length: 100

  - schema_name: aurum_last_name
    display_name: "Last Name"
    type: SingleLineOfText
    max_length: 100
    required: true

  - schema_name: aurum_full_name
    display_name: "Full Name"
    type: SingleLineOfText
    max_length: 200
    description: "Full display name. Originally declared as CalculatedField in this YAML; deployed as plain SingleLineOfText in env (manual deploy oversight, see project_aurum_pp_dataverse_quirks.md Quirk 10). Populated explicitly on insert by load_sample_data.py and (eventually) by REFINE survivorship logic."

  # -------- CONTACT --------
  - schema_name: aurum_email_primary
    display_name: "Primary Email"
    type: SingleLineOfText
    format: Email
    max_length: 320

  - schema_name: aurum_phone_primary
    display_name: "Primary Phone"
    type: SingleLineOfText
    format: Phone
    max_length: 50
    description: "Standardized to E.164-style: +<country>-<area>-<number>"

  # -------- LOCATION (linked tuple — survives together) --------
  - schema_name: aurum_address_line1
    display_name: "Address Line 1"
    type: SingleLineOfText
    max_length: 200

  - schema_name: aurum_city
    display_name: "City"
    type: SingleLineOfText
    max_length: 100
    description: "Linked-tuple survivor with country — both fields come from the same source record."

  - schema_name: aurum_country
    display_name: "Country"
    type: SingleLineOfText
    max_length: 100
    description: "Linked-tuple survivor with city. Standardized to ISO country code where possible."

  - schema_name: aurum_postal_code
    display_name: "Postal Code"
    type: SingleLineOfText
    max_length: 20

  # -------- DEMOGRAPHIC --------
  - schema_name: aurum_birth_year
    display_name: "Birth Year"
    type: WholeNumber
    description: "Year-only for privacy. From LOYALTY source typically."
    min_value: 1900
    max_value: 2025

  - schema_name: aurum_nationality
    display_name: "Nationality"
    type: SingleLineOfText
    max_length: 50

  # -------- LOYALTY ATTRIBUTES (single-source: from LOYALTY only) --------
  - schema_name: aurum_loyalty_tier
    display_name: "Loyalty Tier"
    type: OptionSet
    options:
      - { value: 1, label: "Bronze" }
      - { value: 2, label: "Silver" }
      - { value: 3, label: "Gold" }
      - { value: 4, label: "Platinum" }

  - schema_name: aurum_loyalty_points_balance
    display_name: "Points Balance"
    type: WholeNumber

  - schema_name: aurum_loyalty_member_since
    display_name: "Loyalty Member Since"
    type: DateOnly

  - schema_name: aurum_loyalty_member_number
    display_name: "Loyalty Member Number"
    type: SingleLineOfText
    max_length: 50

  # -------- COMMERCIAL ATTRIBUTES (from CRM + ECOMM) --------
  - schema_name: aurum_crm_segment
    display_name: "CRM Segment"
    type: OptionSet
    options:
      - { value: 1, label: "Basic" }
      - { value: 2, label: "Standard" }
      - { value: 3, label: "Premium" }
      - { value: 4, label: "VIP" }

  - schema_name: aurum_lifetime_value
    display_name: "Lifetime Value"
    type: Currency
    description: "Aggregate of CRM lifetime_value + ECOMM total_spend (deduplicated)."

  - schema_name: aurum_total_orders
    display_name: "Total Orders"
    type: WholeNumber

  # -------- HOUSEHOLD HIERARCHY (self-referential) --------
  - schema_name: aurum_household_head_id
    display_name: "Household Head"
    type: Lookup
    target_entity: aurum_customer
    description: "Self-referential lookup. Customer is the head if this is null."

  # -------- TRUST AND PROVENANCE --------
  - schema_name: aurum_trust_score
    display_name: "Trust Score"
    type: Decimal
    min: 0
    max: 1
    precision: 2
    description: "0.6 * completeness + 0.4 * source_diversity. Capped at 3 sources for full diversity credit."

  - schema_name: aurum_completeness_score
    display_name: "Completeness Score"
    type: Decimal
    min: 0
    max: 1
    precision: 2
    description: "Fraction of 6 key fields populated: first_name, last_name, email, phone, city, country."

  - schema_name: aurum_diversity_score
    display_name: "Source Diversity Score"
    type: Decimal
    min: 0
    max: 1
    precision: 2
    description: "min(distinct_sources / 3, 1.0)."

  - schema_name: aurum_is_golden
    display_name: "Is Golden Record"
    type: TwoOptions
    default_value: false
    description: "True when trust_score >= 0.6."

  - schema_name: aurum_source_systems
    display_name: "Contributing Sources"
    type: SingleLineOfText
    max_length: 200
    description: "Pipe-delimited list: 'CRM|ECOMM|LOYALTY' or any subset."

  - schema_name: aurum_first_seen_date
    display_name: "First Seen"
    type: DateOnly
    description: "Earliest date this entity was observed in any source."

  - schema_name: aurum_last_refined_date
    display_name: "Last Refined"
    type: DateAndTime
    description: "Most recent REFINE pipeline run that updated this record."

  - schema_name: aurum_last_steward_review_date
    display_name: "Last Steward Review"
    type: DateAndTime
    description: "Most recent manual steward action on this record."

  - schema_name: aurum_steward_review_status
    display_name: "Steward Review Status"
    type: OptionSet
    options:
      - { value: 1, label: "Auto-Approved" }
      - { value: 2, label: "Pending Review" }
      - { value: 3, label: "Steward Approved" }
      - { value: 4, label: "Steward Rejected" }
      - { value: 5, label: "Merged" }

views:
  - name: "Active Customers"
    filter: "statecode eq 0"
    columns: [aurum_full_name, aurum_email_primary, aurum_city, aurum_loyalty_tier, aurum_trust_score, aurum_source_systems]
    sort: aurum_trust_score DESC

  - name: "Pending Steward Review"
    filter: "aurum_steward_review_status eq 2"
    columns: [aurum_full_name, aurum_trust_score, aurum_source_systems, aurum_last_refined_date]
    sort: aurum_last_refined_date DESC

  - name: "Low Trust Records"
    filter: "aurum_trust_score lt 0.6"
    columns: [aurum_full_name, aurum_trust_score, aurum_completeness_score, aurum_diversity_score, aurum_source_systems]
    sort: aurum_trust_score ASC

  - name: "Single Source Customers"
    filter: "aurum_diversity_score lt 0.5"
    columns: [aurum_full_name, aurum_source_systems, aurum_trust_score]

forms:
  - name: "Main"
    sections:
      - title: "Identity"
        fields: [aurum_first_name, aurum_middle_name, aurum_last_name, aurum_email_primary, aurum_phone_primary]
      - title: "Location"
        fields: [aurum_address_line1, aurum_city, aurum_country, aurum_postal_code]
      - title: "Loyalty"
        fields: [aurum_loyalty_member_number, aurum_loyalty_tier, aurum_loyalty_points_balance, aurum_loyalty_member_since]
      - title: "Commercial"
        fields: [aurum_crm_segment, aurum_lifetime_value, aurum_total_orders]
      - title: "Household"
        fields: [aurum_household_head_id]
      - title: "Trust & Provenance"
        fields: [aurum_trust_score, aurum_completeness_score, aurum_diversity_score, aurum_is_golden, aurum_source_systems, aurum_first_seen_date, aurum_last_refined_date, aurum_steward_review_status]
